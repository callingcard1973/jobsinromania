[pytest]
# ANOFM PostgreSQL Migration Test Suite Configuration

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Markers for test categorization
markers =
    connection: Connection pool and health tests
    integrity: Data integrity and validation tests
    idempotency: Idempotent migration tests
    send: Email send operation performance tests
    audit: Audit logging and PII masking tests
    recovery: Rollback and recovery procedures tests
    load: Load simulation and concurrency tests
    gdpr: GDPR compliance and deletion tests
    slow: Tests that take > 5 seconds
    integration: Database integration tests

# Timeout for hanging tests (seconds)
timeout = 60

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Database configuration (can be overridden via env vars)
[pytest:ini_options]
postgresql_host = 127.0.0.1
postgresql_port = 5433
postgresql_user = tudor
postgresql_password = tudor
postgresql_database = interjob_master

# Filtering rules
testpaths = .
norecursedirs = .git .venv __pycache__ *.egg-info

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
