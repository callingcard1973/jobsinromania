<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Ads - Universal Classified Ads</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Classified Ads</a>
            <div class="navbar-nav ms-auto" id="auth-nav">
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Filters</h5>
                    </div>
                    <div class="card-body">
                        <form id="filter-form">
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="category-filter">
                                    <option value="">All Categories</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Location</label>
                                <input type="text" class="form-control" id="location-filter" placeholder="Enter location">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Price Range</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="min-price" placeholder="Min">
                                    <span class="input-group-text">-</span>
                                    <input type="number" class="form-control" id="max-price" placeholder="Max">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Search</label>
                                <input type="text" class="form-control" id="search-filter" placeholder="Search ads...">
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="featured-only">
                                <label class="form-check-label" for="featured-only">Featured only</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Apply Filters</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Browse Ads</h2>
                    <a href="/create-ad" class="btn btn-success">Create Ad</a>
                </div>
                <div id="ads-container" class="row">
                </div>
                <div id="pagination" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/ads.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
