<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Universal Classified Ads</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Classified Ads</a>
            <div class="navbar-nav ms-auto" id="auth-nav">
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Admin Panel</h2>

        <div class="row mb-4">
            <div class="col-12">
                <h4>Platform Stats</h4>
                <div id="stats-container" class="row">
                    <div class="text-muted">Loading...</div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <h4>Users</h4>
                <div id="users-container">
                    <div class="text-muted">Loading...</div>
                </div>
            </div>
            <div class="col-md-6">
                <h4>Categories</h4>
                <div id="cat-error" class="alert alert-danger d-none"></div>
                <form id="add-cat-form" class="row g-2 mb-3">
                    <div class="col-auto">
                        <input type="text" class="form-control" id="cat-name" placeholder="Category name" required>
                    </div>
                    <div class="col-auto">
                        <input type="text" class="form-control" id="cat-slug" placeholder="slug (optional)">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">Add</button>
                    </div>
                </form>
                <div id="categories-container">
                    <div class="text-muted">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/admin.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
