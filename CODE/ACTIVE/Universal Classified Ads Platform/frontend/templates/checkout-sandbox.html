<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Payment - Universal Classified Ads</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Classified Ads</a>
            <div class="navbar-nav ms-auto" id="auth-nav">
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body text-center">
                        <div id="checkout-loading">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-3">Processing payment...</p>
                        </div>
                        <div id="checkout-success" class="d-none">
                            <h3 class="text-success">Payment Successful!</h3>
                            <p>Your ad is now in review and will be published once approved.</p>
                            <a href="/my-ads?paid=1" class="btn btn-primary">Go to My Ads</a>
                        </div>
                        <div id="checkout-error" class="d-none">
                            <h3 class="text-danger">Payment Failed</h3>
                            <p id="checkout-error-msg"></p>
                            <a href="/my-ads" class="btn btn-secondary">Back to My Ads</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/checkout-sandbox.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
