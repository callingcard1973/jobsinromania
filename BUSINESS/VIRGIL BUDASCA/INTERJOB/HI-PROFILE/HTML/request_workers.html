<!DOCTYPE html>
<html lang="ro"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solicita Candidati — FactoryJobs.eu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f23;color:#e0e0e0;font-family:Segoe UI,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#16213e;border-radius:12px;padding:35px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4)}
h1{color:#00d4ff;font-size:1.6em;margin-bottom:5px}
.sub{color:#888;font-size:.9em;margin-bottom:25px}
label{display:block;color:#aaa;font-size:.82em;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input,select{width:100%;background:#0f0f23;border:1px solid #333;color:#e0e0e0;padding:11px 14px;border-radius:6px;font-size:.95em;margin-bottom:18px;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:#00d4ff}
select option{background:#16213e}
.row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.btn{width:100%;background:linear-gradient(135deg,#ff6b35,#ff4500);color:white;border:none;padding:14px;border-radius:8px;font-size:1em;font-weight:bold;cursor:pointer;transition:opacity .2s;margin-top:5px}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{display:none;padding:14px;border-radius:8px;margin-top:15px;font-size:.9em;text-align:center}
.msg.ok{background:rgba(0,212,255,.1);border:1px solid #00d4ff;color:#00d4ff;display:block}
.msg.err{background:rgba(255,87,34,.1);border:1px solid #FF5722;color:#ff6b35;display:block}
.sectors{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.sec-btn{background:#0f0f23;border:1px solid #333;color:#888;padding:7px 14px;border-radius:15px;cursor:pointer;font-size:.82em;transition:all .2s}
.sec-btn.active{border-color:var(--c);color:var(--c);background:rgba(255,255,255,.05)}
.note{color:#555;font-size:.78em;text-align:center;margin-top:15px;line-height:1.5}
</style>
</head><body>
<div class="card">
  <h1>Solicita Candidati</h1>
  <p class="sub">Primiti shortlist personalizat in maxim 5 minute</p>

  <form id="form">
    <label>Nume companie / persoana contact</label>
    <input type="text" id="name" placeholder="ex: SC Construct SRL" required>

    <label>Email</label>
    <input type="email" id="email" placeholder="email@companie.ro" required>

    <label>Sector</label>
    <div class="sectors">
      <span class="sec-btn active" data-sector="Constructii" style="--c:#FF5722" onclick="selectSector(this)">Constructii</span>
      <span class="sec-btn" data-sector="Productie" style="--c:#FF9800" onclick="selectSector(this)">Productie</span>
      <span class="sec-btn" data-sector="Alimentar" style="--c:#E91E63" onclick="selectSector(this)">Alimentar</span>
      <span class="sec-btn" data-sector="Logistica" style="--c:#2196F3" onclick="selectSector(this)">Logistica</span>
      <span class="sec-btn" data-sector="Healthcare" style="--c:#00BCD4" onclick="selectSector(this)">Healthcare</span>
      <span class="sec-btn" data-sector="Hospitality" style="--c:#9C27B0" onclick="selectSector(this)">Hospitality</span>
      <span class="sec-btn" data-sector="Agricultura" style="--c:#4CAF50" onclick="selectSector(this)">Agricultura</span>
      <span class="sec-btn" data-sector="General" style="--c:#607D8B" onclick="selectSector(this)">General</span>
    </div>
    <input type="hidden" id="sector" value="Constructii">

    <label>Numar candidati doriti</label>
    <select id="count">
      <option value="5">5 candidati</option>
      <option value="10" selected>10 candidati</option>
      <option value="15">15 candidati</option>
      <option value="20">20 candidati</option>
    </select>

    <button type="submit" class="btn" id="btn">Trimite Shortlist</button>
  </form>

  <div class="msg" id="msg"></div>
  <p class="note">CV-urile complete sunt disponibile la cerere.<br>
  Contactati-ne: <a href="https://wa.me/33751171356" style="color:#00d4ff">WhatsApp +33 7 51 17 13 56</a></p>
</div>

<script>
var API = 'http://192.168.100.21:5055/shortlist';

function selectSector(el) {
  document.querySelectorAll('.sec-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('sector').value = el.dataset.sector;
}

document.getElementById('form').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = 'Se trimite...';
  msg.className = 'msg';
  msg.style.display = 'none';

  fetch(API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      sector: document.getElementById('sector').value,
      count: document.getElementById('count').value,
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok) {
      msg.textContent = 'Shortlist trimis! Verificati emailul in cateva minute.';
      msg.className = 'msg ok';
    } else {
      msg.textContent = d.error || 'Eroare. Incercati din nou.';
      msg.className = 'msg err';
    }
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Trimite Shortlist';
  })
  .catch(function(){
    msg.textContent = 'Eroare de conexiune. Contactati-ne direct pe WhatsApp.';
    msg.className = 'msg err';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Trimite Shortlist';
  });
});
</script>
</body></html>
