schema: spec-driven

context: |
  Tech stack: Markdown-first food strategy workspace with PowerShell sync scripts and imported Python data tooling.
  Architecture: Documentation-led commercial planning around PRODUSMONTAN, cooperative ops, supermarket intelligence, and remote raspibig sync.
  Testing: No formal automated test suite in the FOOD root; verification is file sync and document consistency.
  Style: Keep changes concise, preserve existing markdown structure, and treat raspibig as the source of truth.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules and documents
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase
    - Use hierarchical numbering
    - Keep tasks small enough for one session
  apply:
    - Follow existing markdown and scripting patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas