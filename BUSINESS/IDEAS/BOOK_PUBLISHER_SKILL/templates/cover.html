<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@page { size: {{ cover_width }} {{ cover_height }}; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: {{ cover_width }};
  height: {{ cover_height }};
  background: linear-gradient(135deg, #0d1b2a 0%, #1b2d45 40%, #2a4a6b 100%);
  color: white;
  font-family: 'Georgia', serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 0.75in;
  position: relative;
  overflow: hidden;
}
/* Decorative elements */
.accent-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 0.15in;
  background: linear-gradient(90deg, #c9a84c, #e8d48b, #c9a84c);
}
.accent-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 0.15in;
  background: linear-gradient(90deg, #c9a84c, #e8d48b, #c9a84c);
}
h1 {
  font-size: 36pt;
  line-height: 1.2;
  margin-bottom: 16pt;
  letter-spacing: 2px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
h2 {
  font-size: 16pt;
  font-weight: normal;
  color: #c9a84c;
  margin-bottom: 48pt;
  letter-spacing: 1px;
}
.stats {
  display: flex;
  gap: 32pt;
  margin-bottom: 48pt;
}
.stat {
  text-align: center;
}
.stat .num {
  font-size: 28pt;
  font-weight: bold;
  color: #c9a84c;
}
.stat .label {
  font-size: 9pt;
  color: #8ab;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.edition {
  font-size: 12pt;
  color: #8ab;
  margin-bottom: 8pt;
}
.publisher {
  font-size: 11pt;
  color: #6a8a9f;
  position: absolute;
  bottom: 0.6in;
}
</style>
</head>
<body>
<div class="accent-top"></div>

<h1>{{ title }}</h1>
<h2>{{ subtitle }}</h2>

<div class="stats">
  {% for stat in cover_stats %}
  <div class="stat">
    <div class="num">{{ stat.value }}</div>
    <div class="label">{{ stat.label }}</div>
  </div>
  {% endfor %}
</div>

<div class="edition">{{ edition }}</div>
<div class="publisher">{{ publisher }}</div>

<div class="accent-bottom"></div>
</body>
</html>
